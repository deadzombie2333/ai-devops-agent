AWSTemplateFormatVersion: '2010-09-09'
Description: Simulated SQL Server with workload simulator and log export to S3

Parameters:
  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  VpcId:
    Type: String
    Default: vpc-0fff3df727460e792
  SubnetIds:
    Type: CommaDelimitedList
    Default: "subnet-0272bb7d0bae69272,subnet-04cd7650623883a06,subnet-00e220758ab220f30"

Resources:

  # --- S3 Bucket ---
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sqlserver-log-export-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90

  # --- Networking ---
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda outbound access
      VpcId: !Ref VpcId

  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS SQL Server access from Lambda
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 1433
          ToPort: 1433
          SourceSecurityGroupId: !Ref LambdaSG

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: SQL Server subnets
      SubnetIds: !Ref SubnetIds

  # --- RDS SQL Server ---
  SQLServerDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: sqlserver-log-source
      Engine: sqlserver-ex
      EngineVersion: "15.00"
      DBInstanceClass: db.t3.small
      AllocatedStorage: 20
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      PubliclyAccessible: false
      EnableCloudwatchLogsExports: []
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSG.GroupId
      BackupRetentionPeriod: 0
      DeletionProtection: false

  # --- Secrets Manager ---
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: sqlserver-sim-creds
      SecretString: !Sub '{"host":"${SQLServerDB.Endpoint.Address}","port":1433,"username":"admin","password":"${DBMasterPassword}"}'

  # --- IAM ---
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns: []
      Policies:
        - PolicyName: SimPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: '*'
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${LogBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub ${LogBucket.Arn}
                  - !Sub ${LogBucket.Arn}/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBSecret
              - Effect: Allow
                Action:
                  - rds:DownloadDBLogFilePortion
                  - rds:DescribeDBLogFiles
                Resource: !Sub arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:sqlserver-log-source

  # --- pymssql Layer ---
  PymssqlLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: pymssql-layer
      CompatibleRuntimes:
        - python3.11
      Content:
        S3Bucket: !Sub sqlserver-log-export-${AWS::AccountId}
        S3Key: layers/pymssql-layer.zip

  # --- Workload Simulator Lambda ---
  SimulatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sqlserver-workload-simulator
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref PymssqlLayer
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SECRET_ARN: !Ref DBSecret
      Code:
        ZipFile: |
          import json, os, random, boto3, pymssql

          def get_secret():
              sm = boto3.client('secretsmanager')
              return json.loads(sm.get_secret_value(SecretId=os.environ['SECRET_ARN'])['SecretString'])

          def get_conn(s, db=None):
              kw = dict(server=s['host'], user=s['username'], password=s['password'], port=s['port'])
              if db: kw['database'] = db
              return pymssql.connect(**kw)

          def handler(event, context):
              s = get_secret()
              results = {"normal_ops": 0, "logins_created": 0, "cache_bloat_cycles": 0, "errors": 0}

              # --- Phase 1: Setup databases and tables ---
              conn = get_conn(s)
              cur = conn.cursor()
              for db in ['SimDB', 'AppDB', 'ReportDB']:
                  cur.execute(f"IF DB_ID('{db}') IS NULL CREATE DATABASE {db}")
              conn.commit()
              conn.close()

              conn = get_conn(s, 'SimDB')
              cur = conn.cursor()
              cur.execute("""
                IF OBJECT_ID('dbo.orders','U') IS NULL
                  CREATE TABLE dbo.orders(id INT IDENTITY PRIMARY KEY, customer VARCHAR(100), amount DECIMAL(10,2), status VARCHAR(20), created_at DATETIME DEFAULT GETDATE());
                IF OBJECT_ID('dbo.audit_log','U') IS NULL
                  CREATE TABLE dbo.audit_log(id INT IDENTITY PRIMARY KEY, action VARCHAR(50), detail VARCHAR(500), ts DATETIME DEFAULT GETDATE());
                IF OBJECT_ID('dbo.sessions','U') IS NULL
                  CREATE TABLE dbo.sessions(id INT IDENTITY PRIMARY KEY, username VARCHAR(100), login_time DATETIME DEFAULT GETDATE(), ip VARCHAR(15));
              """)
              conn.commit()

              # --- Phase 2: Normal workload ---
              ops = [
                  "INSERT INTO dbo.orders(customer,amount,status) VALUES('cust_{r}',{amt},'{st}')",
                  "SELECT TOP 10 * FROM dbo.orders ORDER BY created_at DESC",
                  "UPDATE dbo.orders SET status='shipped' WHERE id=(SELECT TOP 1 id FROM dbo.orders WHERE status='pending' ORDER BY NEWID())",
                  "INSERT INTO dbo.audit_log(action,detail) VALUES('ORDER_QUERY','User viewed recent orders')",
                  "INSERT INTO dbo.sessions(username,login_time,ip) VALUES('app_user_{r}',GETDATE(),'10.0.{o3}.{o4}')",
                  "SELECT COUNT(*) FROM dbo.orders WHERE status='pending'",
                  "SELECT customer, SUM(amount) AS total FROM dbo.orders GROUP BY customer",
                  "DELETE FROM dbo.sessions WHERE login_time < DATEADD(HOUR,-24,GETDATE())",
              ]
              for _ in range(random.randint(15, 30)):
                  sql = random.choice(ops).format(
                      r=random.randint(1,500), amt=round(random.uniform(10,5000),2),
                      st=random.choice(['pending','processing','shipped','delivered']),
                      o3=random.randint(0,255), o4=random.randint(1,254))
                  try:
                      cur.execute(sql)
                      conn.commit()
                      results["normal_ops"] += 1
                  except Exception:
                      conn.rollback()
              conn.close()

              # --- Phase 3: Create many SQL logins to bloat TokenAndPermUserStore ---
              # Each new login + user + permission grant adds entries to the security
              # token cache. By never calling DBCC FREESYSTEMCACHE('TokenAndPermUserStore'),
              # the cache grows unbounded — replicating the memory leak in the original logs.
              conn = get_conn(s)
              cur = conn.cursor()
              batch_id = random.randint(10000, 99999)
              dbs = ['SimDB', 'AppDB', 'ReportDB']
              for i in range(20):
                  login_name = f"sim_user_{batch_id}_{i}"
                  try:
                      cur.execute(f"IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name='{login_name}') CREATE LOGIN [{login_name}] WITH PASSWORD='P@ss{random.randint(1000,9999)}!', CHECK_POLICY=OFF")
                      conn.commit()
                      results["logins_created"] += 1
                      # Create user and grant permissions in each database to grow cache
                      for db in dbs:
                          try:
                              c2 = get_conn(s, db)
                              c2cur = c2.cursor()
                              c2cur.execute(f"IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name='{login_name}') CREATE USER [{login_name}] FOR LOGIN [{login_name}]")
                              c2cur.execute(f"GRANT SELECT, INSERT, UPDATE, DELETE TO [{login_name}]")
                              c2.commit()
                              c2.close()
                          except Exception:
                              pass
                  except Exception:
                      conn.rollback()

              # --- Phase 4: Rapid login/permission check cycles to grow cache ---
              # Connect as each created login, run permission-heavy queries across
              # databases. Each distinct security context adds TokenPerm/TokenAudit entries.
              cur.execute("SELECT name FROM sys.server_principals WHERE name LIKE 'sim_user_%' AND type='S'")
              logins = [r[0] for r in cur.fetchall()]
              conn.close()

              for login in random.sample(logins, min(30, len(logins))):
                  pwd_conn = get_conn(s)
                  pwd_cur = pwd_conn.cursor()
                  try:
                      pwd_cur.execute(f"ALTER LOGIN [{login}] WITH PASSWORD='Cycle{random.randint(1,9999)}!'")
                      pwd_conn.commit()
                  except Exception:
                      pwd_conn.rollback()
                  pwd_conn.close()
                  # Connect as this user to generate security token entries
                  for db in dbs:
                      try:
                          uc = pymssql.connect(server=s['host'], user=login,
                                               password=f'Cycle{random.randint(1,9999)}!',
                                               port=s['port'], database=db, login_timeout=3)
                          uc.close()
                      except Exception:
                          pass
                  results["cache_bloat_cycles"] += 1

              # --- Phase 5: Error simulation ---
              # Failed logins (generates Error 18456 in error log)
              for bad_user in ['hacker', 'test_admin', 'sa_backup', 'unknown_app',
                               f'old_user_{random.randint(1,100)}', 'backup_svc']:
                  try:
                      pymssql.connect(server=s['host'], user=bad_user, password='wrong',
                                      port=s['port'], login_timeout=3)
                  except Exception:
                      results["errors"] += 1

              # Permission/query errors
              conn = get_conn(s, 'SimDB')
              cur = conn.cursor()
              for sql in ["EXEC sp_who3", "SELECT * FROM dbo.nonexistent_table",
                          "INSERT INTO dbo.orders VALUES(NULL,NULL,NULL,NULL,NULL,NULL)",
                          "WAITFOR DELAY '00:00:03'; SELECT 1"]:
                  try:
                      cur.execute(sql)
                      conn.commit()
                  except Exception:
                      conn.rollback()
                      results["errors"] += 1
              conn.close()

              return results

  # --- Log Exporter Lambda ---
  LogExporterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sqlserver-log-exporter
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref PymssqlLayer
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SECRET_ARN: !Ref DBSecret
          BUCKET: !Sub sqlserver-log-export-${AWS::AccountId}
          DB_INSTANCE: sqlserver-log-source
      Code:
        ZipFile: |
          import json, csv, io, os, boto3, pymssql
          from datetime import datetime

          DMV_QUERIES = {
              "sys.dm_os_memory_cache_entries": {
                  "sql": "SELECT TOP 200 name, p.TokenName, p.Class, p.SubClass, CONVERT(VARCHAR(200),p.SID,1) AS SID, p.dbid FROM sys.dm_os_memory_cache_entries p WHERE name='TokenAndPermUserStore'",
                  "fmt": "csv"
              },
              "sys_dm_os_ring_buffers": {
                  "sql": "SELECT TOP 50 CONVERT(VARCHAR(50),ring_buffer_address,1) AS ring_buffer_address, ring_buffer_type, timestamp, record FROM sys.dm_os_ring_buffers WHERE ring_buffer_type='RING_BUFFER_SECURITY_CACHE' ORDER BY timestamp DESC",
                  "fmt": "rpt"
              },
              "syslogins": {
                  "sql": "SELECT @@SERVERNAME AS hostname, CONVERT(VARCHAR(200),sid,1) AS sid, name FROM sys.syslogins",
                  "fmt": "csv"
              },
              "syslogins_sid_recent": {
                  "sql": "SELECT CONVERT(VARCHAR(200),sid,1) AS sid, status, name, createdate FROM sys.syslogins WHERE createdate>=DATEADD(MONTH,-6,GETDATE()) ORDER BY createdate DESC",
                  "fmt": "rpt"
              }
          }

          def fmt_rpt(rows):
              if not rows:
                  return ""
              hdrs = list(rows[0].keys())
              widths = [max(len(h), max((len(str(r.get(h,''))) for r in rows), default=0)) for h in hdrs]
              lines = [' '.join(h.ljust(w) for h,w in zip(hdrs,widths)),
                       ' '.join('-'*w for w in widths)]
              for r in rows:
                  lines.append(' '.join(str(r.get(h,'')).ljust(w) for h,w in zip(hdrs,widths)))
              return '\n'.join(lines)

          def fmt_csv_tab(rows):
              if not rows:
                  return ""
              buf = io.StringIO()
              w = csv.DictWriter(buf, fieldnames=rows[0].keys(), delimiter='\t')
              w.writeheader()
              w.writerows(rows)
              return buf.getvalue()

          def handler(event, context):
              sm = boto3.client('secretsmanager')
              s3 = boto3.client('s3')
              rds = boto3.client('rds')
              secret = json.loads(sm.get_secret_value(SecretId=os.environ['SECRET_ARN'])['SecretString'])
              bucket = os.environ['BUCKET']
              now = datetime.utcnow().strftime('%Y%m%d')
              exported = []

              # Part A: DMV query exports
              conn = pymssql.connect(server=secret['host'], user=secret['username'],
                                     password=secret['password'], port=secret['port'])
              cur = conn.cursor(as_dict=True)
              for name, q in DMV_QUERIES.items():
                  cur.execute(q['sql'])
                  rows = cur.fetchall()
                  body = fmt_csv_tab(rows) if q['fmt']=='csv' else fmt_rpt(rows)
                  key = f"dmv_logs/{name}_{now}.{q['fmt']}"
                  s3.put_object(Bucket=bucket, Key=key, Body=body.encode())
                  exported.append({"file": key, "rows": len(rows)})
              conn.close()

              # Part B: RDS error/agent log exports
              try:
                  logs = rds.describe_db_log_files(DBInstanceIdentifier=os.environ['DB_INSTANCE'])
                  for lf in logs.get('DescribeDBLogFiles', []):
                      fname = lf['LogFileName']
                      resp = rds.download_db_log_file_portion(
                          DBInstanceIdentifier=os.environ['DB_INSTANCE'],
                          LogFileName=fname, StartingToken='0')
                      if resp.get('LogFileData'):
                          key = f"error_logs/{fname.replace('/','_')}_{now}.log"
                          s3.put_object(Bucket=bucket, Key=key, Body=resp['LogFileData'].encode())
                          exported.append({"file": key})
              except Exception as e:
                  exported.append({"error_log_export": str(e)})

              return {"statusCode": 200, "exports": exported}

  # --- Reset Lambda ---
  ResetFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sqlserver-reset
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Layers:
        - !Ref PymssqlLayer
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SECRET_ARN: !Ref DBSecret
          BUCKET: !Sub sqlserver-log-export-${AWS::AccountId}
      Code:
        ZipFile: |
          import json, os, boto3, pymssql

          def handler(event, context):
              sm = boto3.client('secretsmanager')
              s3 = boto3.client('s3')
              s = json.loads(sm.get_secret_value(SecretId=os.environ['SECRET_ARN'])['SecretString'])
              results = {"logins_dropped": 0, "dbs_dropped": 0, "cache_cleared": False, "s3_cleared": 0}

              conn = pymssql.connect(server=s['host'], user=s['username'], password=s['password'], port=s['port'])
              cur = conn.cursor()

              # Drop all sim logins
              cur.execute("SELECT name FROM sys.server_principals WHERE name LIKE 'sim_user_%' AND type='S'")
              logins = [r[0] for r in cur.fetchall()]
              for db in ['SimDB', 'AppDB', 'ReportDB']:
                  try:
                      c2 = pymssql.connect(server=s['host'], user=s['username'], password=s['password'], port=s['port'], database=db)
                      c2cur = c2.cursor()
                      for login in logins:
                          try:
                              c2cur.execute(f"IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name='{login}') DROP USER [{login}]")
                              c2.commit()
                          except Exception:
                              c2.rollback()
                      c2.close()
                  except Exception:
                      pass
              for login in logins:
                  try:
                      cur.execute(f"DROP LOGIN [{login}]")
                      conn.commit()
                      results["logins_dropped"] += 1
                  except Exception:
                      conn.rollback()

              # Drop sim databases
              for db in ['SimDB', 'AppDB', 'ReportDB']:
                  try:
                      cur.execute(f"IF DB_ID('{db}') IS NOT NULL BEGIN ALTER DATABASE [{db}] SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE [{db}]; END")
                      conn.commit()
                      results["dbs_dropped"] += 1
                  except Exception:
                      conn.rollback()

              # Clear security token cache
              try:
                  cur.execute("DBCC FREESYSTEMCACHE('TokenAndPermUserStore')")
                  conn.commit()
                  results["cache_cleared"] = True
              except Exception:
                  pass

              conn.close()

              # Clear S3 logs
              bucket = os.environ['BUCKET']
              paginator = s3.get_paginator('list_objects_v2')
              for page in paginator.paginate(Bucket=bucket):
                  for obj in page.get('Contents', []):
                      s3.delete_object(Bucket=bucket, Key=obj['Key'])
                      results["s3_cleared"] += 1

              return results

  # --- EventBridge Schedules ---
  SimSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: sqlserver-sim-schedule
      ScheduleExpression: rate(10 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt SimulatorFunction.Arn
          Id: SimTarget

  SimPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SimulatorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SimSchedule.Arn

  ExportSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: sqlserver-export-schedule
      ScheduleExpression: rate(6 hours)
      State: ENABLED
      Targets:
        - Arn: !GetAtt LogExporterFunction.Arn
          Id: ExportTarget

  ExportPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogExporterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExportSchedule.Arn

Outputs:
  S3Bucket:
    Value: !Ref LogBucket
  RDSEndpoint:
    Value: !GetAtt SQLServerDB.Endpoint.Address
  SimulatorLambda:
    Value: !Ref SimulatorFunction
  ExporterLambda:
    Value: !Ref LogExporterFunction
  ResetLambda:
    Value: !Ref ResetFunction
